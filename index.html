<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rest — for Mahi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:"Outfit",sans-serif;
      background:#080c16;
      color:#e8edf5;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:20px;
    }

    .sky{
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top right, rgba(120,140,255,.08), transparent 30%),
      radial-gradient(circle at bottom center, rgba(100,180,255,.08), transparent 40%),
      #080c16;
      z-index:0;
    }

    .star{
      position:absolute;
      width:2px;
      height:2px;
      background:white;
      border-radius:50%;
      opacity:.6;
      animation:twinkle 4s infinite ease-in-out;
    }

    @keyframes twinkle{
      0%,100%{opacity:.2}
      50%{opacity:1}
    }

    .moon{
      position:fixed;
      top:40px;
      right:60px;
      width:70px;
      height:70px;
      border-radius:50%;
      background:#f6f0de;
      box-shadow:0 0 50px rgba(255,255,220,.2);
      z-index:0;
    }

    .card{
      position:relative;
      z-index:1;
      width:100%;
      max-width:420px;
      background:rgba(16,22,38,.72);
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:32px 26px;
      text-align:center;
      backdrop-filter:blur(16px);
      box-shadow:0 20px 60px rgba(0,0,0,.45);
    }

    .for-mahi{
      color:#c4a882;
      font-size:.9rem;
      margin-bottom:8px;
      letter-spacing:2px;
      text-transform:lowercase;
      font-family:"Cormorant Garamond",serif;
    }

    h1{
      font-family:"Cormorant Garamond",serif;
      font-size:2.7rem;
      font-weight:400;
      margin-bottom:18px;
      color:#dce8f8;
    }

    h1 em{
      color:#a8c4e8;
      font-style:italic;
    }

    .letter{
      font-family:"Cormorant Garamond",serif;
      font-size:1.15rem;
      line-height:1.8;
      color:#9fb0c8;
      margin-bottom:28px;
    }

    .letter strong{
      color:#dbe8ff;
    }

    .scene{
      position:relative;
      height:160px;
      overflow:hidden;
      border-radius:20px;
      margin-bottom:25px;
      background:linear-gradient(180deg,#141c30 0%,#1c2e42 50%,#1d3a30 100%);
      border:1px solid rgba(255,255,255,.06);
    }

    .cloud{
      position:absolute;
      width:60px;
      height:18px;
      background:rgba(255,255,255,.08);
      border-radius:20px;
      top:30px;
      animation:drift 25s linear infinite;
    }

    .cloud::before{
      content:"";
      position:absolute;
      width:24px;
      height:24px;
      border-radius:50%;
      background:inherit;
      top:-10px;
      left:8px;
    }

    .cloud-2{
      top:60px;
      animation-duration:35s;
      opacity:.5;
    }

    @keyframes drift{
      from{left:-80px}
      to{left:110%}
    }

    .hill{
      position:absolute;
      left:-10%;
      right:-10%;
      bottom:0;
      height:50%;
      background:linear-gradient(180deg,#2f5040,#1d3527);
      border-radius:50% 50% 0 0;
    }

    .fence{
      position:absolute;
      bottom:55px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:14px;
    }

    .fence-post{
      width:4px;
      height:28px;
      background:#66513f;
      position:relative;
    }

    .fence-post::before,
    .fence-post::after{
      content:"";
      position:absolute;
      left:-12px;
      width:28px;
      height:3px;
      background:#6f5d4c;
    }

    .fence-post::before{
      top:6px;
    }

    .fence-post::after{
      top:16px;
    }

    .sheep{
      position:absolute;
      width:50px;
      height:40px;
      bottom:55px;
      left:-60px;
      animation:jump 5s infinite ease-in-out paused;
    }

    body.active .sheep{
      animation-play-state:running;
    }

    @keyframes jump{
      0%{left:-10%;transform:translateY(0)}
      40%{left:45%;transform:translateY(-35px)}
      55%{left:58%;transform:translateY(-38px)}
      75%{left:78%;transform:translateY(-8px)}
      100%{left:110%;transform:translateY(0)}
    }

    .sheep-fluff{
      position:absolute;
      width:34px;
      height:26px;
      background:#f0ece6;
      border-radius:50%;
      bottom:8px;
      left:10px;
      box-shadow:
      -4px -2px 0 #ece6de,
      6px -4px 0 #e8e2da,
      14px 0 0 #e4ddd4;
    }

    .sheep-head{
      position:absolute;
      width:16px;
      height:14px;
      background:#2c2c2c;
      border-radius:50%;
      bottom:15px;
      left:2px;
    }

    .count{
      color:#a8c4e8;
      font-size:1.8rem;
      margin-bottom:20px;
      opacity:0;
      transition:.4s;
    }

    body.active .count{
      opacity:1;
    }

    .count small{
      display:block;
      font-size:.8rem;
      color:#6f8098;
      margin-top:4px;
    }

    .btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg, rgba(120,150,255,.4), rgba(90,120,220,.3));
      color:white;
      font-size:1rem;
      cursor:pointer;
      transition:.3s;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .hint{
      margin-top:16px;
      color:#6f8098;
      font-size:.82rem;
      line-height:1.6;
    }

    .footer-heart{
      margin-top:24px;
      color:#5f6f88;
      font-size:.75rem;
    }
  </style>
</head>

<body>

<div class="sky" id="sky"></div>
<div class="moon"></div>

<div class="card">

  <p class="for-mahi">made for you, mahi</p>

  <h1>
    Good night,<br>
    <em>Mahi</em>
  </h1>

  <p class="letter">
    The world can wait until morning.
    Tonight, you do not have to carry everything —
    just lie down, listen, and let the quiet hold you.
    <strong>You are safe. You are loved. Rest is yours.</strong>
  </p>

  <div class="scene">

    <div class="cloud"></div>
    <div class="cloud cloud-2"></div>

    <div class="hill"></div>

    <div class="fence">
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
    </div>

    <div class="sheep" id="sheep">
      <div class="sheep-head"></div>
      <div class="sheep-fluff"></div>
    </div>

  </div>

  <p class="count" id="count">
    0
    <small>sheep</small>
  </p>

  <button class="btn" id="btn">
    Help me sleep, Mahi
  </button>

  <p class="hint" id="hint">
    One tap — gentle sound & sheep begin
  </p>

  <p class="footer-heart">
    with love · sweet dreams
  </p>

</div>

<script>
  const sky = document.getElementById("sky");

  for(let i=0;i<60;i++){
    const s=document.createElement("div");
    s.className="star";

    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";

    s.style.animationDelay=Math.random()*5+"s";

    sky.appendChild(s);
  }

  let on=false;
  let count=0;

  const btn=document.getElementById("btn");
  const sheep=document.getElementById("sheep");
  const countEl=document.getElementById("count");
  const hint=document.getElementById("hint");

  sheep.addEventListener("animationiteration",()=>{
    if(on){
      count++;
      countEl.innerHTML=count+"<small>sheep</small>";
    }
  });

  btn.addEventListener("click",()=>{

    on=!on;

    if(on){

      document.body.classList.add("active");

      btn.textContent="Stop";

      hint.textContent="Close your eyes, Mahi. Just breathe.";

    }else{

      document.body.classList.remove("active");

      btn.textContent="Help me sleep, Mahi";

      hint.textContent="One tap — gentle sound & sheep begin";

      count=0;

      countEl.innerHTML="0<small>sheep</small>";
    }

  });
</script>

</body>
</html>
