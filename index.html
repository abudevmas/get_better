<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rest — for Mahi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Outfit", system-ui, sans-serif;
      background: #080c16;
      color: #e8edf5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
    }

    .sky {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 100% 80% at 50% 120%, rgba(88,110,180,0.22) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(180,140,200,0.08) 0%, transparent 50%),
        #080c16;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d,4s) ease-in-out infinite;
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.15; }
      50% { opacity: 0.75; }
    }

    .moon {
      position: fixed;
      top: 5%;
      right: 7%;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #faf4e8, #d8ccb0);
      box-shadow: 0 0 80px rgba(250,244,232,0.15);
      opacity: 0.55;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 2rem 1.75rem 2.25rem;
      background: rgba(16,22,38,0.72);
      border: 1px solid rgba(168,196,232,0.12);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      text-align: center;
    }

    h1 { font-family: "Cormorant Garamond", serif; font-size: 2.4rem; font-weight: 400; }

    .btn {
      width: 100%;
      padding: 1rem;
      border-radius: 999px;
      border: 1px solid rgba(200,220,245,0.25);
      background: rgba(123,159,212,0.45);
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="sky" id="sky"></div>
  <div class="moon"></div>

  <div class="card">
    <h1>Good night, Mahi</h1>
    <button class="btn" id="btn">Help me sleep</button>
  </div>

  <script>
    (function () {
      const sky = document.getElementById("sky");
      for (let i = 0; i < 50; i++) {
        const s = document.createElement("div");
        s.className = "star";
        s.style.width = s.style.height = (Math.random() > 0.8 ? 3 : 2) + "px";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.setProperty("--d", (3 + Math.random() * 4) + "s");
        sky.appendChild(s);
      }
    })();
  </script>
</body>
</html>
