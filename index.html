<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rest — Mahi</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Outfit,sans-serif;
background:#080c16;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
padding:20px;
color:#e8edf5;
}

.sky{
position:fixed;
inset:0;
background:
radial-gradient(circle at top right,rgba(120,140,255,.08),transparent 30%),
radial-gradient(circle at bottom center,rgba(100,180,255,.08),transparent 40%),
#080c16;
}

.star{
position:absolute;
width:2px;
height:2px;
background:#fff;
border-radius:50%;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2}
50%{opacity:1}
}

.moon{
position:fixed;
top:40px;
right:60px;
width:70px;
height:70px;
border-radius:50%;
background:#f6f0de;
box-shadow:0 0 40px rgba(255,255,220,.2);
}

.card{
position:relative;
z-index:2;
width:100%;
max-width:400px;
padding:30px 24px;
border-radius:28px;
background:rgba(16,22,38,.75);
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(16px);
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.4);
}

.tag{
font-family:"Cormorant Garamond",serif;
color:#c4a882;
letter-spacing:2px;
margin-bottom:10px;
}

h1{
font-family:"Cormorant Garamond",serif;
font-size:2.6rem;
font-weight:400;
margin-bottom:16px;
}

h1 em{
font-style:italic;
color:#a8c4e8;
}

.text{
font-family:"Cormorant Garamond",serif;
line-height:1.8;
font-size:1.1rem;
color:#9fb0c8;
margin-bottom:24px;
}

.scene{
height:150px;
border-radius:18px;
overflow:hidden;
position:relative;
background:linear-gradient(180deg,#141c30,#1d3a30);
margin-bottom:20px;
}

.cloud{
position:absolute;
top:30px;
width:60px;
height:18px;
background:rgba(255,255,255,.08);
border-radius:20px;
animation:drift 25s linear infinite;
}

.cloud::before{
content:"";
position:absolute;
width:24px;
height:24px;
border-radius:50%;
background:inherit;
top:-10px;
left:8px;
}

.cloud.two{
top:60px;
animation-duration:35s;
opacity:.5;
}

@keyframes drift{
from{left:-80px}
to{left:110%}
}

.hill{
position:absolute;
bottom:0;
left:-10%;
right:-10%;
height:50%;
background:linear-gradient(180deg,#2f5040,#1d3527);
border-radius:50% 50% 0 0;
}

.sheep{
position:absolute;
width:50px;
height:40px;
bottom:50px;
left:-60px;
animation:jump 5s infinite paused ease-in-out;
}

body.active .sheep{
animation-play-state:running;
}

@keyframes jump{
0%{left:-10%;transform:translateY(0)}
40%{left:45%;transform:translateY(-35px)}
60%{left:60%;transform:translateY(-38px)}
100%{left:110%;transform:translateY(0)}
}

.fluff{
position:absolute;
width:34px;
height:26px;
background:#f0ece6;
border-radius:50%;
bottom:8px;
left:10px;
box-shadow:-4px -2px 0 #ece6de,6px -4px 0 #e8e2da,14px 0 0 #e4ddd4;
}

.head{
position:absolute;
width:16px;
height:14px;
background:#222;
border-radius:50%;
bottom:15px;
left:2px;
}

.count{
margin-bottom:18px;
font-size:1.7rem;
color:#a8c4e8;
opacity:0;
transition:.3s;
}

body.active .count{
opacity:1;
}

.count small{
display:block;
font-size:.8rem;
color:#6f8098;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:999px;
cursor:pointer;
font-size:1rem;
background:linear-gradient(135deg,rgba(120,150,255,.4),rgba(90,120,220,.3));
color:#fff;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

.hint{
margin-top:16px;
font-size:.82rem;
color:#6f8098;
}

.footer{
margin-top:22px;
font-size:.75rem;
color:#5f6f88;
}
</style>
</head>

<body>

<div class="sky" id="sky"></div>
<div class="moon"></div>

<div class="card">

<div class="tag">made for you, mahi</div>

<h1>Good night,<br><em>Mahi</em></h1>

<div class="text">
The world can wait until morning.
Rest now — you are safe, loved, and enough.
</div>

<div class="scene">

<div class="cloud"></div>
<div class="cloud two"></div>

<div class="hill"></div>

<div class="sheep" id="sheep">
<div class="head"></div>
<div class="fluff"></div>
</div>

</div>

<div class="count" id="count">
0
<small>sheep</small>
</div>

<button id="btn">
Help me sleep
</button>

<div class="hint" id="hint">
One tap — gentle sheep begin
</div>

<div class="footer">
sweet dreams ✦
</div>

</div>

<script>
const sky=document.getElementById("sky");

for(let i=0;i<60;i++){
const s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDelay=Math.random()*4+"s";
sky.appendChild(s);
}

let on=false,count=0;

const btn=document.getElementById("btn");
const sheep=document.getElementById("sheep");
const countEl=document.getElementById("count");
const hint=document.getElementById("hint");

sheep.addEventListener("animationiteration",()=>{
if(on){
count++;
countEl.innerHTML=count+"<small>sheep</small>";
}
});

btn.onclick=()=>{
on=!on;

if(on){
document.body.classList.add("active");
btn.innerText="Stop";
hint.innerText="Close your eyes and breathe.";
}else{
document.body.classList.remove("active");
btn.innerText="Help me sleep";
hint.innerText="One tap — gentle sheep begin";
count=0;
countEl.innerHTML="0<small>sheep</small>";
}
};
</script>

</body>
</html>
